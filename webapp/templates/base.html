<!doctype html>
<html>
<head><title>{% block title %}Backdrop{% endblock %}</title></head>
<body>
<p>
  <a href="/browse">Browse</a> |
  <a href="/search">Search</a> |
  <a href="/match">Match</a> |
  <a href="/cleanup">Cleanup</a>
</p>
<p>
  Min width: <input id="filter-min-width" type="number" min="0" size="6" oninput="filterResults()">
  Min height: <input id="filter-min-height" type="number" min="0" size="6" oninput="filterResults()">
  Min score: <input id="filter-min-score" type="number" step="0.01" size="6" oninput="filterResults()">
  Max score: <input id="filter-max-score" type="number" step="0.01" size="6" oninput="filterResults()">
</p>
<h2>{% block heading %}{% endblock %}</h2>
{% block controls %}{% endblock %}
<p id="status"></p>
<div id="results" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"></div>
<script>
function makeCard(item) {
    const wrap = document.createElement('div');
    wrap.style = 'display:flex;flex-direction:column;align-items:center;gap:4px';
    wrap.id = 'wrap-' + item.hash;

    if (item.width)  wrap.dataset.width = item.width;
    if (item.height) wrap.dataset.height = item.height;
    if (item.aesthetic_score != null) wrap.dataset.aesthetic = item.aesthetic_score;

    const img = document.createElement('img');
    img.src = '/photos/' + item.hash + '?thumbnail=1';
    img.title = (item.orig_filename || item.hash) + ' (' + item.score.toFixed(3) + ')';
    img.style = 'height:200px;object-fit:cover;cursor:pointer';
    img.onclick = () => window.open('/photos/' + item.hash);
    wrap.appendChild(img);

    {% block card_buttons %}
    const removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = async () => {
        if (!confirm('Remove ' + (item.orig_filename || item.hash) + '?')) return;
        const res = await fetch('/photos/' + item.hash + '/delete', {method:'POST'});
        if (res.ok) document.getElementById('wrap-' + item.hash).remove();
        else alert('Failed to remove');
    };
    wrap.appendChild(removeBtn);

    const simBtn = document.createElement('button');
    simBtn.textContent = 'Similar...';
    simBtn.onclick = () => window.location.href = '/match?hash=' + item.hash;
    wrap.appendChild(simBtn);
    {% endblock %}

    return wrap;
}
function filterResults() {
    const minW = parseInt(document.getElementById('filter-min-width').value) || 0;
    const minH = parseInt(document.getElementById('filter-min-height').value) || 0;
    const minS = document.getElementById('filter-min-score').value !== ''
        ? parseFloat(document.getElementById('filter-min-score').value) : -Infinity;
    const maxS = document.getElementById('filter-max-score').value !== ''
        ? parseFloat(document.getElementById('filter-max-score').value) : Infinity;
    for (const card of document.getElementById('results').children) {
        const w = parseInt(card.dataset.width) || 0;
        const h = parseInt(card.dataset.height) || 0;
        const s = card.dataset.aesthetic !== undefined ? parseFloat(card.dataset.aesthetic) : null;
        const pass = w >= minW && h >= minH
            && (s === null || (s >= minS && s <= maxS));
        card.style.display = pass ? '' : 'none';
    }
}
{% block page_scripts %}{% endblock %}
</script>
</body>
</html>
